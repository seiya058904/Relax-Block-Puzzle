<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>&#x8F7B;&#x677E;&#x4FC4;&#x7F57;&#x65AF;&#x65B9;&#x5757;</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #09111d;
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }

      body {
        position: fixed;
        inset: 0;
        -webkit-tap-highlight-color: transparent;
      }

      #gameCanvas {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }

      #wxKeyboard {
        position: fixed;
        left: -9999px;
        top: 0;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      #bootError {
        display: none;
        position: fixed;
        inset: 0;
        padding: 24px 18px;
        box-sizing: border-box;
        background: #09111d;
        color: #ffdfdf;
        font: 16px/1.5 sans-serif;
        white-space: pre-wrap;
        overflow: auto;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>
    <div id="bootError"></div>
    <input id="wxKeyboard" type="text" autocomplete="off" />
    <script>
      (function () {
        const errorBox = document.getElementById('bootError');
        const canvas = document.getElementById('gameCanvas');

        function showError(message) {
          if (!errorBox) {
            return;
          }

          errorBox.style.display = 'block';
          errorBox.textContent = '\u542F\u52A8\u5931\u8D25\n\n' + String(message || '\u672A\u77E5\u9519\u8BEF');

          if (canvas) {
            canvas.style.display = 'none';
          }
        }

        window.addEventListener('error', function (event) {
          showError(event && ((event.error && event.error.stack) || event.message));
        });

        window.addEventListener('unhandledrejection', function (event) {
          const reason = event && event.reason;
          showError((reason && (reason.stack || reason.message)) || reason);
        });
      })();
    </script>
    <script type="module">
      import "./browser-wx-shim.js";
      import "./game.js";
    </script>
  </body>
</html>
